databaseChangeLog:
  - changeSet:
      id: 08-create-books-categories-table
      author: aliaksei
      changes:
        - createTable:
            tableName: books_categories
            columns:
              - column:
                  name: book_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_books_categories_book_id
                    references: books(id)
              - column:
                  name: category_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_books_categories_category_id
                    references: categories(id)
        - addPrimaryKey:
            tableName: books_categories
            columnNames: book_id, category_id
            constraintName: pk_books_categories